  # ── Appointments ─────────────────────────────────────────────────────────
  /businesses/{businessId}/appointments:
    get:
      tags: [Appointments]
      summary: Listar agendamentos do negócio
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: Filtrar por data específica
        - name: professionalId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AppointmentStatus"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Lista paginada de agendamentos
    post:
      tags: [Appointments]
      summary: Criar novo agendamento
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Agendamento criado com status PENDING
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Appointment"
        "409":
          description: Conflito de horário ou fora do horário de atendimento
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Produto vinculado ao serviço sem estoque
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /businesses/{businessId}/appointments/{appointmentId}:
    get:
      tags: [Appointments]
      summary: Obter agendamento por ID
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dados do agendamento

  /businesses/{businessId}/appointments/{appointmentId}/confirm:
    patch:
      tags: [Appointments]
      summary: Confirmar agendamento (PENDING → CONFIRMED)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agendamento confirmado; notificação WhatsApp disparada

  /businesses/{businessId}/appointments/{appointmentId}/cancel:
    patch:
      tags: [Appointments]
      summary: Cancelar agendamento (PENDING|CONFIRMED → CANCELLED)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelAppointmentRequest"
      responses:
        "200":
          description: Agendamento cancelado; notificação WhatsApp disparada

  /businesses/{businessId}/appointments/{appointmentId}/complete:
    patch:
      tags: [Appointments]
      summary: Concluir agendamento (CONFIRMED → COMPLETED)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agendamento concluído; estoque baixado automaticamente
        "422":
